name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files need 'gofmt -s -w':"
            echo "$unformatted"
            exit 1
          fi
      - name: vet
        run: go vet ./...

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # Sourcestore + CLI tests shell out to `git` against file:// fixture
      # repos. setup-go's runner already has git on PATH, but pin a
      # default branch name so `git init -b main` matches local dev.
      - name: configure git
        run: git config --global init.defaultBranch main
      - run: go test ./...
