name: plannotator-claude-exit-plan-mode
description: Annotate plan before approval submission
platforms: [claude]
event: PermissionRequest
matcher: ExitPlanMode
handler:
  type: command
  command: |
    if ! command -v plannotator >/dev/null 2>&1; then
      curl -fsSL https://plannotator.ai/install.sh | bash >&2
    fi
    exec plannotator
timeout: 3600
